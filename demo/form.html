<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo Form — Website Automation Agent</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#f4f5f7; margin:0; }
  .card { max-width:520px; margin:60px auto; background:#fff; border:1px solid #e3e6ea;
    border-radius:12px; padding:32px; box-shadow:0 4px 24px rgba(0,0,0,.06); }
  h1 { margin:0 0 4px; font-size:22px; } p.sub { margin:0 0 24px; color:#6b7280; font-size:14px; }
  label { display:block; font-weight:600; font-size:14px; margin:18px 0 6px; }
  input, textarea { width:100%; box-sizing:border-box; padding:11px 13px; font-size:15px;
    border:1px solid #cfd4dc; border-radius:8px; font-family:inherit; }
  textarea { min-height:96px; resize:vertical; }
  button { margin-top:24px; width:100%; padding:12px; font-size:15px; font-weight:600;
    background:#2563eb; color:#fff; border:0; border-radius:8px; cursor:pointer; }
  .ok { margin-top:16px; color:#15803d; font-weight:600; display:none; }
</style>
</head>
<body>
  <div class="card">
    <h1>Create item</h1>
    <p class="sub">A simple form for demonstrating the automation agent.</p>
    <form onsubmit="event.preventDefault(); document.getElementById('done').style.display='block';">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" placeholder="Enter a name">

      <label for="description">Description</label>
      <textarea id="description" name="description" placeholder="Enter a description"></textarea>

      <button type="submit">Submit</button>
      <div id="done" class="ok">Submitted successfully.</div>
    </form>
  </div>
</body>
</html>
